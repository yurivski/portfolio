<!doctype html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Yuri Pontes · Data Engineering</title>
<meta name="description" content="Portfólio de engenharia de dados e segurança. Pipelines, arquitetura medallion e software open source." />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
  --ink:#0B0D12;
  --panel:#12151C;
  --panel-2:#171B24;
  --line:#232A38;
  --line-soft:#1B212C;
  --text:#E7EAF0;
  --muted:#8A93A3;
  --muted-2:#5C6675;

  --bronze:#C0814A;
  --silver:#AEB6C2;
  --gold:#4493f8;
  --gold-soft:#3a82e0;

  --signal:#3FB950;
  --warn:#D99A2B;
  --fail:#E5534B;

  --accent:var(--gold);
  --shadow:0 1px 0 rgba(255,255,255,.02) inset, 0 18px 50px -28px rgba(0,0,0,.8);

  --maxw:1180px;
  --r:14px;
  --r-sm:10px;

  --f-display:"Bricolage Grotesque", system-ui, sans-serif;
  --f-body:"IBM Plex Sans", system-ui, sans-serif;
  --f-mono:"IBM Plex Mono", ui-monospace, monospace;
}
:root[data-theme="light"]{
  --ink:#F6F5F1;
  --panel:#FFFFFF;
  --panel-2:#FBFAF6;
  --line:#E2DED3;
  --line-soft:#ECE8DD;
  --text:#1B1E25;
  --muted:#5B6472;
  --muted-2:#8A8578;
  --bronze:#9A6326;
  --silver:#5B6472;
  --gold:#1f6feb;
  --gold-soft:#1158c7;
  --signal:#1E8E3E;
  --warn:#B26B00;
  --fail:#C13B33;
  --shadow:0 1px 0 rgba(0,0,0,.02) inset, 0 18px 44px -30px rgba(20,20,20,.35);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
[x-cloak]{display:none !important}

body{
  margin:0;
  background:var(--ink);
  color:var(--text);
  font-family:var(--f-body);
  font-size:16px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  transition:background .35s ease,color .35s ease;
}

body::before{
  content:"";
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(var(--line-soft) 1px, transparent 1px),
    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
  background-size:46px 46px;
  opacity:.35;
  mask-image:radial-gradient(120% 80% at 50% 0%, #000 0%, transparent 70%);
  -webkit-mask-image:radial-gradient(120% 80% at 50% 0%, #000 0%, transparent 70%);
}

.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px;position:relative;z-index:1}

a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer}

.eyebrow{
  font-family:var(--f-mono);
  font-size:11.5px;
  letter-spacing:.28em;
  text-transform:uppercase;
  color:var(--muted);
}

header.bar{
  position:sticky; top:0; z-index:50;
  backdrop-filter:saturate(140%) blur(10px);
  background:color-mix(in srgb, var(--ink) 82%, transparent);
  border-bottom:1px solid var(--line-soft);
}
.bar-in{
  max-width:var(--maxw);margin:0 auto;padding:13px 24px;
  display:flex;align-items:center;gap:18px;
}
.brand{display:flex;align-items:center;gap:11px;font-family:var(--f-mono);font-weight:600;letter-spacing:.02em}
.brand .glyph{
  width:30px;height:30px;border:1px solid var(--line);border-radius:8px;
  display:grid;place-items:center;color:var(--accent);font-size:13px;background:var(--panel);
}
.brand small{color:var(--muted);font-weight:400;font-size:12px}

nav.links{display:flex;gap:4px;margin-left:auto;align-items:center;flex-wrap:wrap}
nav.links a, .cv-btn{
  font-family:var(--f-mono);font-size:12.5px;color:var(--muted);
  padding:8px 12px;border-radius:8px;border:1px solid transparent;
  display:inline-flex;align-items:center;gap:7px;transition:all .18s ease;white-space:nowrap;
}
nav.links a:hover{color:var(--text);border-color:var(--line);background:var(--panel)}
.cv-btn{color:var(--text);border-color:var(--line);background:var(--panel)}
.cv-btn:hover{border-color:var(--accent);color:var(--accent)}
.cv-btn svg{width:14px;height:14px}

.toggles{display:flex;gap:6px;align-items:center;padding-left:10px;margin-left:4px;border-left:1px solid var(--line-soft)}
.tg{
  width:34px;height:34px;border-radius:8px;border:1px solid var(--line);
  background:var(--panel);color:var(--muted);
  display:grid;place-items:center;transition:all .18s ease;position:relative;overflow:hidden;
}
.tg:hover{color:var(--text);border-color:var(--accent)}
.tg svg{width:16px;height:16px;display:block}
.tg .cap{
  position:absolute;bottom:-1px;right:-1px;font-family:var(--f-mono);
  font-size:7px;letter-spacing:.05em;color:var(--muted);background:var(--panel);
  padding:0 2px;border-top-left-radius:4px;line-height:1.4;
}

.hero{padding:74px 0 38px}
.hero h1{
  font-family:var(--f-display);
  font-weight:800;
  font-size:clamp(42px,7vw,86px);
  line-height:.98;
  letter-spacing:-.025em;
  margin:16px 0 0;
}
.hero h1 .dim{color:var(--muted)}
.hero .lede{
  max-width:640px;margin:20px 0 0;font-size:clamp(16px,2vw,19px);color:var(--muted);
}
.hero .lede b{color:var(--text);font-weight:600}

.pipe{
  margin:40px 0 26px;
  border:1px solid var(--line);border-radius:var(--r);
  background:linear-gradient(180deg,var(--panel),color-mix(in srgb,var(--panel) 70%, var(--ink)));
  box-shadow:var(--shadow);
  padding:26px 28px 22px;
}
.pipe .pipe-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:14px;flex-wrap:wrap}
.pipe .pipe-head .eyebrow{margin:0}
.pipe svg{width:100%;height:118px;display:block;overflow:visible}
.flow-pulse{stroke-dasharray:5 12;animation:flow 2.6s linear infinite}
@keyframes flow{to{stroke-dashoffset:-34}}
.node-label{font-family:var(--f-mono);font-size:11px;fill:var(--muted);letter-spacing:.06em}
.node-sub{font-family:var(--f-mono);font-size:9px;fill:var(--muted-2)}

.philosophy{
  margin-top:18px;font-family:var(--f-mono);font-size:13px;color:var(--muted);
  border-left:2px solid var(--accent);padding-left:14px;line-height:1.7;
}
.philosophy span{color:var(--silver)}

.stack-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:30px}
.chip{
  font-family:var(--f-mono);font-size:12px;color:var(--muted);
  border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:6px 13px;
}

section{padding:58px 0;position:relative}
.sec-head{display:flex;align-items:baseline;gap:16px;margin-bottom:30px;flex-wrap:wrap}
.sec-head .idx{font-family:var(--f-mono);color:var(--accent);font-size:13px}
.sec-head h2{
  font-family:var(--f-display);font-weight:700;font-size:clamp(26px,4vw,38px);
  letter-spacing:-.02em;margin:0;
}
.sec-head p{color:var(--muted);margin:0;font-size:14.5px;max-width:520px}
.divider{height:1px;background:var(--line-soft);border:0;margin:0}

.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:26px}
.filter{
  font-family:var(--f-mono);font-size:12.5px;color:var(--muted);
  border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:8px 14px;
  transition:all .16s ease;
}
.filter:hover{color:var(--text);border-color:var(--silver)}
.filter.active{color:var(--ink);background:var(--accent);border-color:var(--accent);font-weight:600}
:root[data-theme="light"] .filter.active{color:#fff}

.grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:18px;
}
.win{
  border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
  background:var(--panel);box-shadow:var(--shadow);
  display:flex;flex-direction:column;
  transition:transform .22s ease,border-color .22s ease;
  position:relative;
}
.win:hover{transform:translateY(-4px);border-color:var(--silver)}
.win.feat{border-color:color-mix(in srgb,var(--accent) 55%,var(--line))}
.win.feat::before{
  content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);z-index:3;
}
.win-bar{
  display:flex;align-items:center;gap:7px;padding:10px 13px;
  border-bottom:1px solid var(--line-soft);background:var(--panel-2);
}
.win-bar .dots{display:flex;gap:5px}
.win-bar .dots i{width:8px;height:8px;border-radius:50%;background:var(--line);display:block}
.win.feat .win-bar .dots i:first-child{background:var(--accent)}
.win-bar .fname{font-family:var(--f-mono);font-size:11px;color:var(--muted)}
.win-bar .tag{
  margin-left:auto;font-family:var(--f-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);border-radius:5px;padding:2px 6px;
}
.win .thumb{aspect-ratio:16/9;background:var(--ink);border-bottom:1px solid var(--line-soft);position:relative;overflow:hidden}
.win .thumb svg{width:100%;height:100%;display:block}
[data-theme="dark"]  .win .thumb .thumb-light{display:none}
[data-theme="light"] .win .thumb .thumb-dark{display:none}
.win .body{padding:15px 16px 17px;display:flex;flex-direction:column;gap:9px;flex:1}
.win .body h3{font-family:var(--f-display);font-weight:700;font-size:18px;margin:0;letter-spacing:-.01em}
.win .body p{margin:0;font-size:13.5px;color:var(--muted);line-height:1.55;flex:1}
.win .meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px}
.win .meta span{font-family:var(--f-mono);font-size:10.5px;color:var(--muted-2);border:1px solid var(--line-soft);border-radius:5px;padding:2px 6px}
.win .links{display:flex;gap:10px;margin-top:4px}
.win .links a{font-family:var(--f-mono);font-size:11.5px;color:var(--muted);display:inline-flex;align-items:center;gap:5px}
.win .links a:hover{color:var(--accent)}
.win .links svg{width:12px;height:12px}

.adr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.adr details{
  border:1px solid var(--line);border-radius:var(--r-sm);background:var(--panel);overflow:hidden;
  transition:border-color .18s ease;
}
.adr details[open]{border-color:color-mix(in srgb,var(--accent) 45%,var(--line))}
.adr summary{
  list-style:none;cursor:pointer;padding:16px 18px;
  display:flex;align-items:center;gap:12px;font-family:var(--f-display);font-weight:700;font-size:16px;
}
.adr summary::-webkit-details-marker{display:none}
.adr summary .q{
  font-family:var(--f-mono);font-size:11px;color:var(--accent);
  border:1px solid color-mix(in srgb,var(--accent) 35%,transparent);border-radius:5px;padding:2px 6px;flex:none;
}
.adr summary .plus{margin-left:auto;color:var(--muted);font-family:var(--f-mono);transition:transform .2s ease}
.adr details[open] summary .plus{transform:rotate(45deg);color:var(--accent)}
.adr .ans{padding:0 18px 18px 18px;color:var(--muted);font-size:14px;line-height:1.65}

.dash{
  border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--panel);box-shadow:var(--shadow);
}
.dash-top{
  display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--line-soft);
  background:var(--panel-2);font-family:var(--f-mono);font-size:12px;color:var(--muted);flex-wrap:wrap;
}
.live{display:inline-flex;align-items:center;gap:7px;color:var(--text)}
.live .beat{width:8px;height:8px;border-radius:50%;background:var(--signal);position:relative}
.live .beat::after{content:"";position:absolute;inset:-5px;border-radius:50%;border:1px solid var(--signal);opacity:.5;animation:beat 1.8s ease-out infinite}
@keyframes beat{to{transform:scale(2.4);opacity:0}}
.dash table{width:100%;border-collapse:collapse;font-size:13.5px}
.dash th{
  text-align:left;font-family:var(--f-mono);font-weight:500;font-size:10.5px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--muted-2);padding:12px 18px;border-bottom:1px solid var(--line-soft);
}
.dash td{padding:14px 18px;border-bottom:1px solid var(--line-soft);vertical-align:middle}
.dash tr:last-child td{border-bottom:0}
.dash tr:hover td{background:var(--panel-2)}
.dash .pname{font-family:var(--f-display);font-weight:700;font-size:15px}
.dash .layer{font-family:var(--f-mono);font-size:11px;color:var(--muted)}
.st{display:inline-flex;align-items:center;gap:8px;font-family:var(--f-mono);font-size:12px}
.st i{width:8px;height:8px;border-radius:50%;display:block}
.st.ok i{background:var(--signal);box-shadow:0 0 0 3px color-mix(in srgb,var(--signal) 22%,transparent)}
.st.warn i{background:var(--warn);box-shadow:0 0 0 3px color-mix(in srgb,var(--warn) 22%,transparent)}
.st.ok{color:var(--signal)}
.st.warn{color:var(--warn)}
.dash .when{font-family:var(--f-mono);font-size:12px;color:var(--muted)}
.dash .dur{font-family:var(--f-mono);font-size:12px;color:var(--muted-2)}

.cv-wrap{
  margin-top:14px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;
  border:1px dashed var(--line);border-radius:var(--r-sm);padding:16px 18px;background:var(--panel);
}
.cv-wrap .big{display:inline-flex;align-items:center;gap:10px;font-family:var(--f-mono);font-size:13px;color:var(--text);
  border:1px solid var(--accent);border-radius:8px;padding:10px 16px;transition:all .18s ease}
.cv-wrap .big:hover{background:var(--accent);color:var(--ink)}
:root[data-theme="light"] .cv-wrap .big:hover{color:#fff}
.cv-wrap .note{font-size:12.5px;color:var(--muted-2);max-width:420px;line-height:1.5}
.cv-wrap .note a{color:var(--muted);border-bottom:1px solid var(--line)}

footer{border-top:1px solid var(--line-soft);padding:40px 0 60px;margin-top:30px}
.foot-in{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.foot-in .sig{font-family:var(--f-mono);font-size:12px;color:var(--muted-2)}
.foot-sock{display:flex;gap:6px;flex-wrap:wrap}
.foot-sock a{font-family:var(--f-mono);font-size:12px;color:var(--muted);border:1px solid var(--line);border-radius:7px;padding:7px 12px;transition:all .16s ease}
.foot-sock a:hover{color:var(--accent);border-color:var(--accent)}

.reveal{transition:opacity .6s ease,transform .6s ease}
html.js-anim .reveal{opacity:0;transform:translateY(14px)}
html.js-anim .reveal.seen{opacity:1;transform:none}

.metrics{margin-top:38px;border:1px solid var(--line);border-radius:var(--r);background:var(--panel);box-shadow:var(--shadow);overflow:hidden}
.metrics-top{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line-soft);font-family:var(--f-mono);font-size:11.5px;color:var(--muted)}
.metrics-top .src{display:inline-flex;align-items:center;gap:8px;color:var(--text)}
.metrics-top .src svg{width:14px;height:14px}
.sync{margin-left:auto;display:inline-flex;align-items:center;gap:7px;font-size:11px}
.sync .dot{width:7px;height:7px;border-radius:50%;background:var(--muted-2);transition:background .3s ease}
.sync.on .dot{background:var(--signal);box-shadow:0 0 0 3px color-mix(in srgb,var(--signal) 20%,transparent)}
.sync.off .dot{background:var(--warn)}
.metrics-body{display:flex;align-items:stretch}
.metrics-grid{display:grid;grid-template-columns:repeat(3,max-content);justify-content:start;flex:none}
.metric{padding:16px 18px;border-right:1px solid var(--line-soft);display:flex;flex-direction:column;gap:4px;min-width:0}
.metric:nth-child(-n+3){border-bottom:1px solid var(--line-soft)}
.metric .num{font-family:var(--f-display);font-weight:800;font-size:26px;letter-spacing:-.02em;line-height:1}
.metric .lab{font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);white-space:nowrap}
.langs{flex:1;padding:16px 18px;display:flex;flex-direction:column;gap:10px;justify-content:center;min-width:0}
.langbar{display:flex;height:9px;border-radius:6px;overflow:hidden;background:var(--panel-2)}
.langbar span{display:block;height:100%}
.langlegend{display:flex;flex-wrap:wrap;gap:9px 14px}
.langlegend .li{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-mono);font-size:11px;color:var(--muted)}
.langlegend .li i{width:8px;height:8px;border-radius:2px;display:block;flex:none}
.metrics-off{padding:18px;font-family:var(--f-mono);font-size:12px;color:var(--muted-2)}

.win .stars{display:inline-flex;align-items:center;gap:4px;font-family:var(--f-mono);font-size:10.5px;color:var(--gold)}
.win .stars svg{width:11px;height:11px}

.feed{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);box-shadow:var(--shadow);overflow:hidden}
.feed-top{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line-soft);font-family:var(--f-mono);font-size:12px;color:var(--muted)}
.feed ul{list-style:none;margin:0;padding:0}
.feed li{display:flex;align-items:flex-start;gap:13px;padding:13px 18px;border-bottom:1px solid var(--line-soft)}
.feed li:last-child{border-bottom:0}
.feed li:hover{background:var(--panel-2)}
.feed .ic{flex:none;width:30px;height:30px;border-radius:8px;border:1px solid var(--line);display:grid;place-items:center;color:var(--accent);background:var(--panel-2)}
.feed .ic svg{width:15px;height:15px}
.feed .ev{display:flex;flex-direction:column;gap:2px;min-width:0;flex:1}
.feed .ev a{font-size:14px;color:var(--text);font-weight:500}
.feed .ev a:hover{color:var(--accent)}
.feed .ev .ago{font-family:var(--f-mono);font-size:11px;color:var(--muted-2)}
.feed-off{padding:24px 18px;font-family:var(--f-mono);font-size:12.5px;color:var(--muted-2);text-align:center}
.feed-skel{padding:15px 18px}
.feed-skel .row{height:13px;background:var(--panel-2);border-radius:6px;margin-bottom:13px;animation:pulse 1.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:.9}}

.st.fail i{background:var(--fail);box-shadow:0 0 0 3px color-mix(in srgb,var(--fail) 22%,transparent)}
.st.fail{color:var(--fail)}
.st.na i{background:var(--muted-2)}
.st.na{color:var(--muted)}
.srctag{font-family:var(--f-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--bronze);border:1px solid color-mix(in srgb,var(--bronze) 40%,transparent);border-radius:5px;padding:1px 5px;margin-right:8px}
.dash a.when:hover{color:var(--accent)}

@media (max-width:980px){
  .grid{grid-template-columns:repeat(2,1fr)}
  .adr{grid-template-columns:1fr}
}
@media (max-width:680px){
  nav.links{display:none}
  .bar-in{gap:10px}
  .grid{grid-template-columns:1fr}
  .dash .hide-sm{display:none}
  .hero{padding:48px 0 26px}
  .metrics-body{flex-direction:column}
  .metrics-grid{grid-template-columns:repeat(2,max-content)}
  .metric{border-right:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
  .metric:nth-child(-n+3){border-bottom:1px solid var(--line-soft)}
  .metric:nth-child(3n){border-right:1px solid var(--line-soft)}
  .metric:nth-child(2n){border-right:0}
  .metric:nth-last-child(-n+2){border-bottom:0}
  .langs{border-top:1px solid var(--line-soft)}
}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important;transition:none !important;scroll-behavior:auto}
  .reveal{opacity:1;transform:none}
}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
</style>
</head>

<body x-data="portfolio()" :data-theme-proxy="apply()" x-cloak>

<header class="bar">
  <div class="bar-in">
    <a href="#top" class="brand" aria-label="Yuri Pontes">
      <span class="glyph">YP</span>
      <span x-text="'yuri.pontes'"></span><small>/data</small>
    </a>

    <nav class="links">
      <a :href="urls.linkedin" target="_blank" rel="noopener">LinkedIn</a>
      <a :href="'mailto:'+urls.email" x-text="t.nav.contact"></a>
      <a :href="urls.github" target="_blank" rel="noopener">GitHub</a>

<script>
function art(kind){
  const c='var(--accent)', s='var(--silver)', m='var(--muted)', l='var(--line)', b='var(--bronze)';
  const W='100%';
  const open='<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg">';
  const close='</svg>';
  const grid='<defs><pattern id="g" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M20 0H0V20" fill="none" stroke="'+l+'" stroke-width="1" opacity=".5"/></pattern></defs><rect width="320" height="180" fill="url(#g)"/>';
  switch(kind){
    case 'protocol':
      return open+grid+
        '<rect x="40" y="34" width="240" height="22" rx="4" fill="var(--panel-2)" stroke="'+l+'"/>'+
        '<rect x="46" y="41" width="60" height="8" rx="2" fill="'+c+'"/>'+
        '<rect x="118" y="41" width="40" height="8" rx="2" fill="'+m+'"/>'+
        '<rect x="170" y="41" width="90" height="8" rx="2" fill="'+m+'"/>'+
        [0,1,2,3].map(i=>'<rect x="40" y="'+(64+i*22)+'" width="240" height="18" rx="4" fill="var(--panel)" stroke="'+l+'"/><rect x="46" y="'+(69+i*22)+'" width="44" height="8" rx="2" fill="'+s+'"/><rect x="118" y="'+(69+i*22)+'" width="30" height="8" rx="2" fill="'+m+'" opacity=".7"/><rect x="170" y="'+(69+i*22)+'" width="80" height="8" rx="2" fill="'+m+'" opacity=".5"/>').join('')+
        '<circle cx="270" cy="44" r="3" fill="'+c+'"/>'+close;
    case 'medallion':
      return open+grid+
        '<line x1="60" y1="90" x2="140" y2="90" stroke="'+l+'" stroke-width="2"/>'+
        '<line x1="180" y1="90" x2="250" y2="90" stroke="'+l+'" stroke-width="2"/>'+
        '<circle cx="50" cy="90" r="16" fill="var(--panel-2)" stroke="'+b+'" stroke-width="2"/><circle cx="50" cy="90" r="5" fill="'+b+'"/>'+
        '<circle cx="160" cy="90" r="18" fill="var(--panel-2)" stroke="'+s+'" stroke-width="2"/><circle cx="160" cy="90" r="5" fill="'+s+'"/>'+
        '<circle cx="262" cy="90" r="20" fill="color-mix(in srgb,'+c+' 14%,var(--panel-2))" stroke="'+c+'" stroke-width="2.5"/><circle cx="262" cy="90" r="6" fill="'+c+'"/>'+
        '<text x="50" y="126" text-anchor="middle" font-family="monospace" font-size="9" fill="'+m+'">bronze</text>'+
        '<text x="160" y="126" text-anchor="middle" font-family="monospace" font-size="9" fill="'+m+'">silver</text>'+
        '<text x="262" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="'+c+'">gold</text>'+close;
    case 'drift':
      return open+grid+
        '<rect x="34" y="40" width="110" height="100" rx="6" fill="var(--panel)" stroke="'+l+'"/>'+
        '<rect x="176" y="40" width="110" height="100" rx="6" fill="var(--panel)" stroke="'+l+'"/>'+
        [0,1,2,3].map(i=>'<rect x="44" y="'+(54+i*20)+'" width="90" height="10" rx="2" fill="'+(i===2?c:s)+'" opacity="'+(i===2?'.9':'.5')+'"/>').join('')+
        [0,1,2,3].map(i=>'<rect x="186" y="'+(54+i*20)+'" width="90" height="10" rx="2" fill="'+(i===2?'var(--warn)':s)+'" opacity="'+(i===2?'.95':'.5')+'"/>').join('')+
        '<path d="M150 70l20 20-20 20" fill="none" stroke="'+c+'" stroke-width="2"/>'+
        '<text x="160" y="135" text-anchor="middle" font-family="monospace" font-size="10" fill="var(--warn)">drift</text>'+close;
    case 'mask':
      return open+grid+
        [0,1,2].map(i=>'<rect x="50" y="'+(46+i*30)+'" width="220" height="20" rx="4" fill="var(--panel)" stroke="'+l+'"/>').join('')+
        '<rect x="58" y="50" width="70" height="12" rx="2" fill="'+s+'" opacity=".5"/>'+
        '<rect x="140" y="50" width="50" height="12" rx="2" fill="'+c+'"/>'+
        '<rect x="58" y="80" width="50" height="12" rx="2" fill="'+s+'" opacity=".5"/>'+
        '<rect x="120" y="80" width="80" height="12" rx="2" fill="'+c+'"/>'+
        '<rect x="58" y="110" width="90" height="12" rx="2" fill="'+c+'"/>'+
        '<text x="245" y="124" text-anchor="end" font-family="monospace" font-size="9" fill="'+m+'">LGPD</text>'+close;
    case 'sat':
      return open+grid+
        Array.from({length:5}).map((_,r)=>Array.from({length:8}).map((_,k)=>{
          const on=((r*8+k)%3===0);
          return '<rect x="'+(48+k*28)+'" y="'+(48+r*16)+'" width="22" height="11" rx="2" fill="'+(on?c:'var(--panel-2)')+'" stroke="'+l+'" stroke-width="1"/>';
        }).join('')).join('')+
        '<text x="160" y="150" text-anchor="middle" font-family="monospace" font-size="10" fill="'+m+'">SAT · true</text>'+close;
    default: return open+grid+close;
  }
}

function projImg(srcLight, srcDark){
  const wrap='<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:18px;box-sizing:border-box;background:var(--ink)">';
  const sty='max-width:100%;max-height:100%;object-fit:contain';
  const img=(src,cls)=>'<img'+(cls?' class="'+cls+'"':'')+' src="'+src+'" alt="" style="'+sty+'" loading="lazy" decoding="async">';
  if(srcDark){
    return wrap+img(srcLight,'thumb-light')+img(srcDark,'thumb-dark')+'</div>';
  }
  return wrap+img(srcLight)+'</div>';
}

function portfolio(){
  return {
    lang:'pt',
    theme:'dark',
    activeFilter:'all',

    urls:{
      linkedin:'https://www.linkedin.com/in/yuri-pontes/',
      github:'https://github.com/yurivski',
      codeberg:'https://codeberg.org/yurivski',
      devto:'https://dev.to/yurilbrok',
      email:'yuripontes.cont@gmail.com',
      cv:'./curriculo-v.publica_yuri-jr-data-eng.pdf',
    },

    heroStack:['Python','SQL','PostgreSQL','PySpark','Delta Lake','Docker','AWS','DuckDB'],
    filterList:['all','Python','SQL','PostgreSQL','PySpark','Delta Lake','Docker','AWS'],

    apply(){
      document.documentElement.setAttribute('data-theme', this.theme);
      document.documentElement.setAttribute('lang', this.lang==='pt' ? 'pt-BR' : 'en-US');
      return '';
    },
    toggleLang(){ this.lang = this.lang==='pt' ? 'en' : 'pt'; },
    toggleTheme(){ this.theme = this.theme==='dark' ? 'light' : 'dark'; },

    apiBase:'/api',
    ghUser:'yurivski',
    liveStatus:'loading',
    syncedAt:null,
    _poll:null,
    live:{ stars:0, repos:0, contributions:0, issues:0, prs:0, commits:0, languages:[], events:[], actions:[], repos_list:[] },

    init(){ this.loadAll(); },

    async api(path){
      try{
        const ctrl=new AbortController();
        const to=setTimeout(()=>ctrl.abort(), 6000);
        const r=await fetch(this.apiBase+path, {signal:ctrl.signal, cache:'no-store', headers:{'accept':'application/json'}});
        clearTimeout(to);
        if(!r.ok) return null;
        return await r.json();
      }catch(_){ return null; }
    },

    async loadAll(){
      this.liveStatus='loading';
      const results=await Promise.all([ this.loadMetrics(), this.loadEvents(), this.loadActions(), this.loadRepos() ]);
      const anyOk=results.some(Boolean);
      this.liveStatus = anyOk ? 'ok' : 'offline';
      this.syncedAt = Date.now();
      if(anyOk) this.startPolling();
    },

    async loadMetrics(){
      const d=await this.api('/metrics'); if(!d) return false;
      this.live.stars=d.stars||0; this.live.repos=d.repos||0; this.live.contributions=d.contributions||0;
      this.live.issues=d.issues||0; this.live.prs=d.prs||0; this.live.commits=d.commits||0;
      this.live.languages=Array.isArray(d.languages)?d.languages:[];
      return true;
    },
    async loadEvents(){
      const d=await this.api('/events'); if(!d) return false;
      const arr=Array.isArray(d)?d:[];
      this.live.events=arr.map(ev=>this.normalizeEvent(ev)).slice(0,12);
      return true;
    },
    async loadActions(){
      const d=await this.api('/actions'); if(!Array.isArray(d)) return false;
      this.live.actions=d; return true;
    },
    async loadRepos(){
      const d=await this.api('/repos'); if(!Array.isArray(d)) return false;
      this.live.repos_list=d; return true;
    },

    startPolling(){
      if(this._poll) return;
      const tick=async ()=>{
        const e=await this.loadEvents();
        const a=await this.loadActions();
        if(e||a){ this.syncedAt=Date.now(); if(this.liveStatus!=='ok') this.liveStatus='ok'; }
      };
      this._poll=setInterval(tick, 30000);
      document.addEventListener('visibilitychange', ()=>{
        if(document.visibilityState==='visible') tick();
      });
    },

    metric(key){
      if(this.liveStatus==='loading') return '·';
      const v = this.live[key];
      return (v==null)?'·':String(v);

      const pal=['var(--gold)','var(--silver)','var(--bronze)','var(--signal)','#7C93C3','#C77DBB','#5FB3B3','var(--muted)'];
      return pal[i%pal.length];

    syncLabel(){
      const L=this.t.sync;
      if(this.liveStatus==='loading') return L.loading;
      if(this.liveStatus==='offline') return L.offline;
      if(!this.syncedAt) return L.live;
      return L.live+' · '+this.timeAgo(new Date(this.syncedAt).toISOString());
    },

    normalizeEvent(ev){
      return {
        action: ev.action || 'other',
        url: ev.url || (ev.repo ? ('https://github.com/'+ev.repo) : this.urls.github),
        when: ev.created_at,
        repo: ev.repo || '',
        count: (ev.count!=null ? ev.count : (ev.size||0)),
        number: ev.number || null,
        refType: ev.ref_type || null,
        source: ev.source || 'github'
      };
    },
    eventLabel(ev){
      const pt=this.lang==='pt'; const repo=ev.repo||''; const n=ev.number?(' #'+ev.number):'';
      switch(ev.action){
        case 'push':    return pt ? ('fez push em '+repo) : ('pushed to '+repo);
        case 'pr':      return pt ? ('pull request'+n+' em '+repo) : ('pull request'+n+' in '+repo);
        case 'issue':   return pt ? ('issue'+n+' em '+repo) : ('issue'+n+' in '+repo);
        case 'comment': return pt ? ('comentou em '+repo) : ('commented on '+repo);
        case 'star':    return pt ? ('marcou '+repo+' com estrela') : ('starred '+repo);
        case 'create':  return pt ? ('criou '+(ev.refType||'repo')+' em '+repo) : ('created '+(ev.refType||'repo')+' in '+repo);
        case 'fork':    return pt ? ('forkou '+repo) : ('forked '+repo);
        case 'release': return pt ? ('publicou release em '+repo) : ('released in '+repo);
        case 'delete':  return pt ? ('removeu uma ref em '+repo) : ('deleted a ref in '+repo);
        case 'public':  return pt ? ('tornou '+repo+' público') : ('made '+repo+' public');
        default:        return pt ? ('atividade em '+repo) : ('activity in '+repo);
      }
    },

      const I={
        push:'<path d="M12 19V6M5 12l7-7 7 7"/>',
        pr:'<circle cx="6" cy="6" r="2"/><circle cx="6" cy="18" r="2"/><circle cx="18" cy="16" r="2"/><path d="M6 8v8M18 14V9a3 3 0 00-3-3h-3"/>',
        issue:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.4"/>',
        comment:'<path d="M21 15a2 2 0 01-2 2H8l-4 4V5a2 2 0 012-2h13a2 2 0 012 2z"/>',
        star:'<path d="M12 3l2.7 5.5 6 .9-4.3 4.2 1 6L12 16.8 6.6 19.6l1-6L3.3 9.4l6-.9z"/>',
        create:'<path d="M12 5v14M5 12h14"/>',
        fork:'<circle cx="6" cy="6" r="2"/><circle cx="18" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><path d="M6 8v1a4 4 0 004 4h4a4 4 0 004-4V8M12 17v-3"/>',
        release:'<path d="M20 12l-8 8-8-8 8-8z"/><circle cx="12" cy="12" r="2.4"/>',
        other:'<circle cx="12" cy="12" r="3"/>'
      };
      return I[action]||I.other;
    },

    timeAgo(iso){
      const then=new Date(iso).getTime(); if(isNaN(then)) return '';
      const s=Math.max(0,Math.floor((Date.now()-then)/1000)); const pt=this.lang==='pt';
      if(s<60) return pt?'agora':'just now';
      const m=Math.floor(s/60); if(m<60) return pt?('há '+m+' min'):(m+'m ago');
      const h=Math.floor(m/60); if(h<24) return pt?('há '+h+' h'):(h+'h ago');
      const d=Math.floor(h/24); if(d<30) return pt?('há '+d+' d'):(d+'d ago');
      const mo=Math.floor(d/30); return pt?('há '+mo+(mo===1?' mês':' meses')):(mo+'mo ago');
    },
    fmtDate(iso){
      const dt=new Date(iso); if(isNaN(dt.getTime())) return String(iso||'');
      const p=n=>String(n).padStart(2,'0');
      return dt.getFullYear()+'-'+p(dt.getMonth()+1)+'-'+p(dt.getDate())+' '+p(dt.getHours())+':'+p(dt.getMinutes());
    },
    fmtDur(sec){
      let s=Math.max(0,Math.floor(sec||0)); const p=n=>String(n).padStart(2,'0');
      return p(Math.floor(s/3600))+':'+p(Math.floor((s%3600)/60))+':'+p(s%60);
    },

<script>
(function(){
  var root=document.documentElement;
  var reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if(reduce || !('IntersectionObserver' in window)) return;

  root.classList.add('js-anim');

  var io=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('seen'); io.unobserve(e.target); }
    });
  }, { rootMargin:'0px 0px -8% 0px', threshold:0.04 });

  function bind(){
    var els=document.querySelectorAll('.reveal');
    for(var i=0;i<els.length;i++){ io.observe(els[i]); }
  }
  if(document.readyState!=='loading'){ bind(); }
  else { document.addEventListener('DOMContentLoaded', bind); }

  setTimeout(function(){
    var pend=document.querySelectorAll('.reveal:not(.seen)');
    for(var i=0;i<pend.length;i++){ pend[i].classList.add('seen'); }
  }, 2500);
})();
</script>
